version: '3.9'

services:
  backend:
    build: ./backend
    container_name: sbom-shield-api
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - JWT_SECRET=sbom-shield-change-in-production
    volumes:
      - sbom-data:/app/data
      - sbom-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: sbom-shield-ui
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sbom-data:
  sbom-uploads:
